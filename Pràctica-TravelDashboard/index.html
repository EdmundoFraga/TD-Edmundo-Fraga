<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Travel Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Travel Dashboard</h1>
  <select id="citySelector"></select>
</header>

<main>

  <section id="summary" class="card"></section>

  <section id="weather" class="card"></section>

  <section id="currency" class="card">
    <h3>Conversión de moneda</h3>
    <input type="number" id="amount" placeholder="Quantitat en EUR">
    <button id="convertBtn">Convertir</button>
    <p id="result"></p>
  </section>

  <section id="message" class="card"></section>

</main>

<script src="main.js"></script>
</body>
</html>
